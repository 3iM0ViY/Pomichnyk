{% extends "base.html" %}

{% block title %}Увійти | Pomichnyk{% endblock %}

{% block content %}
<section class="auth-page">
	<div class="auth-card">
		<h1>Увійти</h1>

		<form method="post">
			{% csrf_token %}
			{{ form.as_p }}

			<button type="submit" class="btn-primary">Увійти</button>
		</form>

		<p>
			Ще немає акаунта?
			<a href="{% url 'pomichnyk_core:register' %}">Зареєструватися</a>
		</p>
	</div>
</section>
{% endblock %}
